<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Siddhan Logs DB Admin{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; align-items: center; gap: 2rem; }
    .nav h1 { font-size: 1.25rem; color: #818cf8; }
    .nav a { color: #94a3b8; text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
    .nav a:hover { color: #e2e8f0; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .card { background: #1e293b; border-radius: 0.75rem; border: 1px solid #334155; overflow: hidden; margin-bottom: 1.5rem; }
    .card-header { padding: 1rem 1.5rem; border-bottom: 1px solid #334155; font-weight: 600; }
    .card-body { padding: 1.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { background: #0f172a; color: #94a3b8; text-align: left; padding: 0.75rem 1rem; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; position: sticky; top: 0; }
    td { padding: 0.75rem 1rem; border-top: 1px solid #334155; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover td { background: #1e293b; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; border: none; cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
    .btn-ghost:hover { background: #334155; color: #e2e8f0; }
    .btn-sm { padding: 0.25rem 0.75rem; font-size: 0.75rem; }
    input, textarea, select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; width: 100%; }
    input:focus, textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
    .table-card { padding: 1rem 1.5rem; background: #1e293b; border-radius: 0.5rem; border: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; }
    .table-card:hover { border-color: #6366f1; transform: translateY(-2px); }
    .table-card a { color: #e2e8f0; text-decoration: none; font-weight: 500; }
    .pagination { display: flex; gap: 0.5rem; align-items: center; justify-content: center; margin-top: 1rem; }
    .badge { background: #334155; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; }
    .error { background: #451a1a; border: 1px solid #ef4444; padding: 1rem; border-radius: 0.5rem; color: #fca5a5; }
    .success { background: #14532d; border: 1px solid #22c55e; padding: 1rem; border-radius: 0.5rem; color: #86efac; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #94a3b8; font-weight: 500; }
  </style>
</head>
<body>
  <nav class="nav">
    <h1>Siddhan Logs DB</h1>
    <a href="/">Tables</a>
    <a href="/sql">SQL Console</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
