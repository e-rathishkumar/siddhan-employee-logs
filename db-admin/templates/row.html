{% extends "base.html" %}
{% block title %}Row {{ row['id'] }} - {{ table_name }}{% endblock %}
{% block content %}
<h2 style="margin-bottom: 1.5rem;">{{ table_name }} — Row #{{ row['id'] }}</h2>
<div class="card">
  <div class="card-body">
    {% for col in columns %}
    <div class="form-group">
      <label>{{ col }}</label>
      <div style="padding: 0.5rem; background: #0f172a; border-radius: 0.5rem; word-break: break-all;">{{ row[col] }}</div>
    </div>
    {% endfor %}
  </div>
</div>
<a href="/table/{{ table_name }}" class="btn btn-ghost">Back</a>
<a href="/table/{{ table_name }}/edit/{{ row['id'] }}" class="btn btn-primary">Edit</a>
{% endblock %}
