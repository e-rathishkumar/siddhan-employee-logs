services:
  backend:
    build:
      context: ./attendance-backend
      dockerfile: Dockerfile
    container_name: siddhan-logs-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/siddhan_logs.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-generate-a-secure-random-string}
      - FACE_MATCH_THRESHOLD=0.80
      - ALLOWED_ORIGINS=*
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@siddhan.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-Siddhan@123}
    volumes:
      - backend_data:/app/uploads
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  admin:
    build:
      context: ./ai-attendance-admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_MAP_TILE_URL: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
    container_name: siddhan-logs-admin
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  db-admin:
    build:
      context: ./db-admin
      dockerfile: Dockerfile
    container_name: siddhan-logs-db-admin
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/app/data/siddhan_logs.db
    volumes:
      - sqlite_data:/app/data
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
  sqlite_data:
