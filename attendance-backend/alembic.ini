[alembic]
script_location = alembic
prepend_sys_path = .
# Set via env var or .env file. Do not commit real credentials.
# sqlalchemy.url = postgresql://USER:PASSWORD@localhost:5432/DB_NAME
sqlalchemy.url = sqlite:///./attendai.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
